<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>试卷入口</title>

<script src="ads.js"></script>

<style>

body{
font-family:Arial, sans-serif;
background:#f8f8f8;
padding:20px;
margin:0;
color:#333;
}

h2{
margin-bottom:10px;
}

h3{
margin-top:0;
color:#666;
font-weight:normal;
}

/* 搜索框 */

.search-box{
display:flex;
max-width:420px;
margin-bottom:20px;
}

.search-box input{
flex:1;
padding:12px 14px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px 0 0 8px;
border-right:none;
box-sizing:border-box;
}

.search-box button{
padding:12px 18px;
font-size:16px;
border:1px solid #ccc;
background:#0077cc;
color:white;
border-radius:0 8px 8px 0;
cursor:pointer;
}

.search-box button:hover{
background:#005fa3;
}

/* 文件夹 */

.folder{
display:block;
padding:14px 18px;
margin-bottom:12px;
background:#fff;
border-radius:8px;
color:#0077cc;
font-weight:bold;
cursor:pointer;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
transition:0.2s;
}

.folder:hover{
background:#e6f0ff;
transform:translateY(-2px);
}

.tip{
margin:25px 0 15px;
text-align:center;
color:#0077cc;
}

</style>

</head>

<body>

<h2>试卷入口</h2>
<h3>推荐使用加速器或者校园网访问</h3>

<div class="search-box">
<input id="search" placeholder="搜索试卷..." oninput="searchFolders()">
<button onclick="searchFolders()">搜索</button>
</div>

<div id="list"></div>

<script>

let exams={}
let allFolders=[]

fetch("pdf_mapping_nested.json")
.then(r=>r.json())
.then(data=>{
exams=data
render()
})

function render(){

let list=document.getElementById("list")
list.innerHTML=""

allFolders=[]

for(let dir in exams){

if(dir.startsWith("_")) continue

if(dir==="---"){
let d=document.createElement("div")
d.className="tip"
d.innerHTML="—— 以下为部分同学急需科目 ——"
list.appendChild(d)
continue
}

allFolders.push(dir)

let div=document.createElement("div")
div.className="folder"
div.innerText=dir

div.onclick=()=>{
location.href="subject.html?dir="+encodeURIComponent(dir)
}

list.appendChild(div)

}

}

function searchFolders(){

let kw=document.getElementById("search").value.trim()

let folders=document.querySelectorAll(".folder")

if(kw===""){
folders.forEach(f=>f.style.display="block")
return
}

let results=[]

folders.forEach(f=>{

let name=f.innerText

let matchCount=0

for(let ch of kw){
if(name.includes(ch)) matchCount++
}

let score=matchCount/kw.length

if(name.includes(kw)){
score+=1
}

results.push({
el:f,
score:score
})

})

results.sort((a,b)=>b.score-a.score)

folders.forEach(f=>f.style.display="none")

results.forEach(r=>{
if(r.score>0.3){
r.el.style.display="block"
}
})

}

/* 支持回车搜索 */

document.getElementById("search").addEventListener("keypress",function(e){
if(e.key==="Enter"){
searchFolders()
}
})

</script>

</body>
</html>
