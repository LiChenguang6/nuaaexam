<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>试卷入口</title>

<script src="ads.js"></script>

<style>

body{
font-family:Arial, sans-serif;
background:#f8f8f8;
padding:20px;
margin:0;
color:#333;
}

h2{
margin-bottom:10px;
}

h3{
margin-top:0;
color:#666;
font-weight:normal;
}

/* 搜索框 */

.search-box{
display:flex;
max-width:520px;
margin-bottom:10px;
}

.search-box input{
flex:1;
padding:12px 14px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px 0 0 8px;
border-right:none;
box-sizing:border-box;
}

.search-box button{
padding:12px 18px;
font-size:16px;
border:1px solid #ccc;
color:white;
cursor:pointer;
white-space:nowrap;   /* 防止手机端竖排文字 */
}

/* 搜索按钮 */

.search-btn{
background:#0077cc;
border-radius:0;
}

.search-btn:hover{
background:#005fa3;
}

/* 主页按钮 */

.home-btn{
background:#28a745;
border-radius:0 8px 8px 0;
}

.home-btn:hover{
background:#1f8c38;
}

/* 返回按钮 */

#resetBtn{
display:none;
margin-bottom:20px;
padding:8px 16px;
border:none;
background:#888;
color:white;
border-radius:6px;
cursor:pointer;
}

#resetBtn:hover{
background:#666;
}

/* 文件夹 */

.folder{
display:block;
padding:14px 18px;
margin-bottom:12px;
background:#fff;
border-radius:8px;
color:#0077cc;
font-weight:bold;
cursor:pointer;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
transition:0.2s;
}

.folder:hover{
background:#e6f0ff;
transform:translateY(-2px);
}

.tip{
margin:25px 0 15px;
text-align:center;
color:#0077cc;
}

</style>

</head>

<body>

<h2>试卷入口</h2>
<h3>推荐使用加速器或者校园网访问</h3>

<div class="search-box">
<a href="https://nuaaexam.store">
<button class="search-btn">主页</button>
</a>
<input id="search" placeholder="搜索试卷..." oninput="searchFolders()">

<button class="search-btn" onclick="searchFolders()">搜索</button>

</div>

<button id="resetBtn" onclick="resetSearch()">返回全部</button>

<div id="list"></div>

<script>

function goHome(){
location.href="nuaaexam.store"
}

let exams={}
let allFolders=[]

fetch("pdf_mapping_nested.json")
.then(r=>r.json())
.then(data=>{
exams=data
render()
})

function render(){

let list=document.getElementById("list")
list.innerHTML=""

allFolders=[]

for(let dir in exams){

if(dir.startsWith("_")) continue

if(dir==="---"){
let d=document.createElement("div")
d.className="tip"
d.innerHTML="—— 以下为部分同学急需科目 ——"
list.appendChild(d)
continue
}

allFolders.push(dir)

let div=document.createElement("div")
div.className="folder"
div.innerText=dir

div.onclick=()=>{
location.href="subject.html?dir="+encodeURIComponent(dir)
}

list.appendChild(div)

}

}

function searchFolders(){

let kw=document.getElementById("search").value.trim()

let folders=Array.from(document.querySelectorAll(".folder"))

if(kw===""){
folders.forEach(f=>f.style.display="block")
document.getElementById("resetBtn").style.display="none"
return
}

document.getElementById("resetBtn").style.display="inline-block"

let results = folders.map(f=>{

let name=f.innerText

let matchCount=0

for(let ch of kw){
if(name.includes(ch)) matchCount++
}

let score = matchCount / kw.length

return {
el:f,
score:score
}

})

results = results.filter(r=>r.score>0.8)

results.sort((a,b)=>b.score-a.score)

folders.forEach(f=>f.style.display="none")

results.forEach(r=>{
r.el.style.display="block"
})

}

function resetSearch(){

document.getElementById("search").value=""

let folders=document.querySelectorAll(".folder")

folders.forEach(f=>f.style.display="block")

document.getElementById("resetBtn").style.display="none"

}

document.getElementById("search").addEventListener("keypress",function(e){
if(e.key==="Enter"){
searchFolders()
}
})

</script>

</body>
</html>
