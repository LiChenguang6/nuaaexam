<html lang="zh-CN">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #60a5fa; /* 调淡的蓝色 */
      --primary-dark: #3b82f6; /* 稍微深一点的蓝色 */
      --primary-light: #dbeafe;
      --primary-extra-light: #eff6ff;
      --text: #1e293b;
      --text-light: #64748b;
      --background: #f8fafc;
      --white: #ffffff;
      --shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      --shadow-hover: 0 15px 30px rgba(0, 0, 0, 0.1);
      --radius: 16px;
      --transition: all 0.3s ease;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--background);
      font-family: "Inter", "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .wrap {
      width: 90%;
      max-width: 800px;
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      text-align: center;
      padding: 50px 30px;
      position: relative;
      overflow: hidden;
      transition: var(--transition);
    }

    .wrap:hover {
      box-shadow: var(--shadow-hover);
    }

    .wrap::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-dark));
    }

    .logo-container {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: var(--primary-extra-light);
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 4px solid var(--primary-light);
      box-shadow: 0 5px 15px rgba(96, 165, 250, 0.2);
    }

    .logo-icon {
      font-size: 48px;
      color: var(--primary);
    }

    h1 {
      color: var(--text);
      font-weight: 700;
      font-size: 2rem;
      margin: 0 0 10px;
    }

    .subtitle {
      color: var(--text-light);
      font-size: 1.1rem;
      margin-bottom: 30px;
    }

    .content {
      max-width: 90%;
      margin: 0 auto 30px;
      text-align: center;
      font-size: 1.1rem;
      line-height: 1.8;
      color: var(--text-light);
      word-wrap: break-word;
      padding: 20px;
      background: var(--primary-extra-light);
      border-radius: 12px;
      position: relative;
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-left: 4px solid var(--primary);
    }

    .content::before {
      content: '"';
      position: absolute;
      top: 10px;
      left: 15px;
      font-size: 3rem;
      color: var(--primary);
      opacity: 0.3;
      font-family: Georgia, serif;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--primary);
      color: var(--white);
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      text-decoration: none;
      transition: var(--transition);
      box-shadow: 0 4px 6px rgba(96, 165, 250, 0.2);
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 5px;
      height: 5px;
      background: rgba(255, 255, 255, 0.5);
      opacity: 0;
      border-radius: 100%;
      transform: scale(1, 1) translate(-50%);
      transform-origin: 50% 50%;
    }

    .btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(96, 165, 250, 0.3);
    }

    .btn:hover::after {
      animation: ripple 1s ease-out;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--primary-dark), #2563eb);
    }

    .links {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .links a {
      transition: var(--transition);
    }

    .links a:hover {
      transform: translateY(-3px);
    }

    footer {
      text-align: center;
      margin-top: 40px;
      color: var(--text-light);
      font-size: 0.9rem;
      width: 100%;
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(96, 165, 250, 0.3);
      border-radius: 50%;
      border-top-color: var(--primary);
      animation: spin 1s ease-in-out infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes ripple {
      0% {
        transform: scale(0, 0);
        opacity: 0.5;
      }
      100% {
        transform: scale(20, 20);
        opacity: 0;
      }
    }

    @media screen and (max-width: 768px) {
      .wrap {
        padding: 40px 20px;
        margin: 20px auto;
      }
      
      .logo-container {
        width: 100px;
        height: 100px;
      }
      
      .logo-icon {
        font-size: 40px;
      }
      
      h1 {
        font-size: 1.7rem;
      }
      
      .subtitle {
        font-size: 1rem;
      }
      
      .content {
        font-size: 1rem;
        padding: 15px;
      }
      
      .btn {
        font-size: 0.95rem;
        padding: 10px 20px;
      }
      
      .buttons {
        gap: 10px;
      }
    }

    @media screen and (max-width: 480px) {
      .wrap {
        padding: 30px 15px;
      }
      
      .logo-container {
        width: 80px;
        height: 80px;
      }
      
      .logo-icon {
        font-size: 32px;
      }
      
      h1 {
        font-size: 1.5rem;
      }
      
      .buttons {
        flex-direction: column;
        align-items: center;
      }
      
      .btn {
        width: 100%;
        max-width: 250px;
      }
    }
  </style>
</head>
<body>

  <script>
    // 优化加载体验
    document.addEventListener('DOMContentLoaded', function() {
      const quoteElement = document.getElementById('quote');
      
      // 显示加载动画
      quoteElement.innerHTML = '<span class="loading"></span>正在加载每日一句...';
      
      // 设置超时处理
      const timeout = setTimeout(() => {
        quoteElement.innerHTML = '加载超时，请检查网络连接。';
      }, 8000);
      
      // 获取每日一句
      fetch('https://v1.hitokoto.cn/?encode=json&c=d&c=i&c=k')
        .then(response => {
          if (!response.ok) {
            throw new Error('网络响应不正常');
          }
          return response.json();
        })
        .then(data => {
          clearTimeout(timeout);
          const text = data.hitokoto;
          const from = data.from ? `<br><span style="font-style: italic;">—— ${data.from}</span>` : '';
          quoteElement.innerHTML = text + from;
        })
        .catch(error => {
          clearTimeout(timeout);
          console.error('获取每日一句失败:', error);
          quoteElement.innerHTML = '加载失败，请刷新重试。<br><small>错误信息: ' + error.message + '</small>';
        });
    });
  </script>
</body>
